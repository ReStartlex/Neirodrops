# nginx для neurodrop.ru → Next.js (pm2) на 127.0.0.1:3001
#
# Установка на VPS:
#   sudo cp /opt/neurodrop/deploy/nginx/neurodrop.ru.conf /etc/nginx/sites-available/neurodrop.ru
#   sudo ln -s /etc/nginx/sites-available/neurodrop.ru /etc/nginx/sites-enabled/  # если ещё нет
#   sudo nginx -t && sudo systemctl reload nginx
#
# Сертификат neurodrop.ru уже выпущен certbot'ом — ниже он подключён напрямую.
# Если certbot его перевыпустит, пути не меняются.

# HTTP → редирект на HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name neurodrop.ru www.neurodrop.ru;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name neurodrop.ru www.neurodrop.ru;

    ssl_certificate /etc/letsencrypt/live/neurodrop.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/neurodrop.ru/privkey.pem;

    client_max_body_size 2m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
        application/xml image/svg+xml;
    gzip_min_length 1024;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Кэш статики Next.js (хэшируется при сборке — кэшируем надолго).
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
